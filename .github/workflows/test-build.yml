name: Test Build

# Automatically builds the module on push

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'module/**'
      - '.github/workflows/test-build.yml'

jobs:
  test-build:
    runs-on: ubuntu-latest
    name: Test Build Module

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare module structure
        run: |
          echo "Preparing module from repository..."

          # Copy module to build directory
          mkdir -p build/module
          cp -r module/* build/module/

          echo "Module structure prepared"

      - name: Update version with commit
        run: |
          PROP_FILE="build/module/module.prop"
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"

          # Get current version
          CURRENT_VERSION=$(grep "^version=" "$PROP_FILE" | cut -d= -f2 | tr -d '\r')

          # Append commit hash to version
          NEW_VERSION="${CURRENT_VERSION}-${COMMIT_SHORT}"

          # Update module.prop
          sed -i "s/^version=.*/version=$NEW_VERSION/" "$PROP_FILE"

          echo "Version updated: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Get module info
        id: module_info
        run: |
          PROP_FILE="build/module/module.prop"
          MODULE_ID=$(grep "^id=" "$PROP_FILE" | cut -d= -f2 | tr -d '\r')
          MODULE_NAME=$(grep "^name=" "$PROP_FILE" | cut -d= -f2 | tr -d '\r')
          MODULE_VERSION=$(grep "^version=" "$PROP_FILE" | cut -d= -f2 | tr -d '\r')

          echo "module_id=$MODULE_ID" >> $GITHUB_OUTPUT
          echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "module_version=$MODULE_VERSION" >> $GITHUB_OUTPUT

          echo "Module: $MODULE_NAME $MODULE_VERSION"

      - name: Prepare artifact
        id: prepare_artifact
        run: |
          MODULE_ID="${{ steps.module_info.outputs.module_id }}"
          COMMIT_SHORT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHORT:0:7}"

          # Create artifact name with commit hash and timestamp
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ARTIFACT_NAME="${MODULE_ID}-test-${COMMIT_SHORT}-${TIMESTAMP}"

          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT

          echo "Test build artifact: $ARTIFACT_NAME"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_artifact.outputs.artifact_name }}
          path: build/module
          retention-days: 7

      - name: Generate build summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # Test Build Completed

          **Artifact:** \`${{ steps.prepare_artifact.outputs.artifact_name }}.zip\`
          **Commit:** \`${{ steps.prepare_artifact.outputs.commit_short }}\`
          **Version:** ${{ steps.module_info.outputs.module_version }}

          EOF
